spring:
  application:
    name: Placeholder
  datasource:
    url: jdbc:mysql://localhost:3306/placeholder?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

seat:
  hold:
    ttl-minutes: 5   # 좌석 홀드 유지 시간(분). 서버가 held_until = now + TTL로 설정
  expiry:
    scan-interval-ms: 60000   # 만료된 HELD 좌석 스캔 주기(ms). 스케줄러가 AVAILABLE로 해제

queue:
  # 입장 토큰 TTL(분). 홀드 TTL(5분)과 동일 — 만료 후 hold 시도 시 대기열 재진입
  entry-token-ttl-minutes: 5
  admission:
    # 동시 활성 세션(입장 토큰 보유) 전역 상한 (C). DB 풀이 아니라 앱 세션 용량 기준 — ADR-013.
    max-active-sessions: 200
    # 초당 입장 허용 수 전역 상한 (R). 유입 스파이크 평탄화.
    rate-per-second: 20
    scan-interval-ms: 1000   # 배치 입장 스케줄러 주기(ms). ceiling·rate 한도 내 대기열 → 입장 토큰 발급

jwt:
  secret: ${JWT_SECRET:placeholder-dev-secret-key-must-be-at-least-32-bytes!!}
  expiration-ms: 86400000
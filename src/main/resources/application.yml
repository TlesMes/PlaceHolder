spring:
  application:
    name: Placeholder
  datasource:
    url: jdbc:mysql://localhost:3306/placeholder?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

seat:
  hold:
    ttl-minutes: 5   # 좌석 홀드 유지 시간(분). 서버가 held_until = now + TTL로 설정
  expiry:
    scan-interval-ms: 60000   # 만료된 HELD 좌석 스캔 주기(ms). 스케줄러가 AVAILABLE로 해제

queue:
  # 이벤트별 동시 입장 가능 인원(in-flight 입장 토큰 상한). ADR-013 초기값: 풀 크기 10 × 0.8 = 8
  max-concurrent-holds: 8
  # 입장 토큰 TTL(분). 홀드 TTL(5분)과 동일 — 만료 후 hold 시도 시 대기열 재진입
  entry-token-ttl-minutes: 5
  admission:
    scan-interval-ms: 1000   # 배치 입장 스케줄러 주기(ms). 슬롯 여유분만큼 대기열 → 입장 토큰 발급

jwt:
  secret: ${JWT_SECRET:placeholder-dev-secret-key-must-be-at-least-32-bytes!!}
  expiration-ms: 86400000
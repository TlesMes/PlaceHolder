spring:
  application:
    name: Placeholder
  datasource:
    url: jdbc:mysql://localhost:3306/placeholder?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

seat:
  hold:
    ttl-minutes: 5   # 좌석 홀드 유지 시간(분). 서버가 held_until = now + TTL로 설정

jwt:
  secret: ${JWT_SECRET:placeholder-dev-secret-key-must-be-at-least-32-bytes!!}
  expiration-ms: 86400000
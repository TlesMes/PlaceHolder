spring:
  # datasource(url/username/password)는 MySQLIntegrationTest의 @ServiceConnection이
  # Testcontainers 컨테이너 기준으로 런타임 주입한다. 여기서 지정하지 않는다.
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long!!
  expiration-ms: 3600000

seat:
  hold:
    ttl-minutes: 5
  expiry:
    # 테스트는 SeatExpiryService.releaseExpiredSeats()를 직접 호출해 결정적으로 검증한다.
    # 스케줄러 자동 발화가 테스트에 끼어들지 않도록 주기를 매우 크게 둔다(사실상 비활성).
    scan-interval-ms: 3600000

queue:
  entry-token-ttl-minutes: 5
  admission:
    # 기본 테스트는 ceiling=rate=8 (단일 틱에서 8명 입장). 다른 값이 필요한 테스트는
    # @TestPropertySource로 클래스별 오버라이드한다.
    max-active-sessions: 8
    rate-per-second: 8
    # 테스트는 QueueAdmissionService.admitWaiting()을 직접 호출해 결정적으로 검증한다.
    # 또한 Redis 없는 컨텍스트(MySQLIntegrationTest)에서 매초 연결 오류가 나지 않도록
    # 자동 발화를 사실상 비활성화한다.
    scan-interval-ms: 3600000
